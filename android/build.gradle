allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}


buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0' // Make sure this line is here
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0' // If you're using Kotlin
        classpath 'com.google.gms:google-services:4.3.15' // For Firebase (optional)
    }
}